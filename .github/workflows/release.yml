# author: elliot-huffman
name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "prerelease npm dist-tag to publish"
        required: true
        type: choice
        options:
          - rc
          - next
      version:
        description: "Exact prerelease version. rc: x.y.z-rc.n, next: x.y.z-next.n"
        required: true
permissions:
  id-token: write
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4
        with:
          ref: ${{ github.ref_name }}
      - name: Validate release tag
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release tag must be stable vX.Y.Z, for example v13.0.0"
            exit 1
          fi
          export VERSION="${TAG_NAME#v}"
          node - <<'NODE'
          const cp = require("child_process");
          const fs = require("fs");
          const version = process.env.VERSION;
          const files = cp
            .execFileSync("git", ["ls-files"], { encoding: "utf8" })
            .split(/\r?\n/)
            .filter((file) => file === "package.json" || file.endsWith("/package.json"));
          const mismatches = [];
          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            if (json.version && json.version !== "0.0.0" && json.version !== version)
              mismatches.push(`${file}: ${json.version}`);
          }
          if (mismatches.length) {
            console.error(`release tag ${process.env.TAG_NAME} does not match package versions:`);
            for (const line of mismatches) console.error(`- ${line}`);
            process.exit(1);
          }
          NODE
      - name: Validate dispatch ref
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "$GITHUB_REF_NAME" != "master" ]]; then
            echo "::error::manual prerelease publishing must run from master"
            exit 1
          fi
      - name: Validate dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          NPM_TAG: ${{ inputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          case "$NPM_TAG" in
            rc)
              PATTERN='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-rc\.(0|[1-9][0-9]*)$'
              EXAMPLE='13.0.0-rc.2'
              ;;
            next)
              PATTERN='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-next\.(0|[1-9][0-9]*)$'
              EXAMPLE='13.0.0-next.0'
              ;;
            *)
              echo "::error::tag must be rc or next"
              exit 1
              ;;
          esac
          if [[ ! "$VERSION" =~ $PATTERN ]]; then
            echo "::error::tag '$NPM_TAG' requires version like $EXAMPLE"
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install
      - name: Bump versions
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CURRENT="$(node -p "require('./package.json').version")"
          if [[ "$CURRENT" == "$VERSION" ]]; then
            echo "Version is already $VERSION."
          else
            pnpm bumpp "$VERSION" --no-commit --no-tag --no-push --recursive --yes
          fi
      - name: Validate bumped versions
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node - <<'NODE'
          const cp = require("child_process");
          const fs = require("fs");
          const version = process.env.VERSION;
          const files = cp
            .execFileSync("git", ["ls-files"], { encoding: "utf8" })
            .split(/\r?\n/)
            .filter((file) => file === "package.json" || file.endsWith("/package.json"));
          const mismatches = [];
          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            if (json.version && json.version !== "0.0.0" && json.version !== version)
              mismatches.push(`${file}: ${json.version}`);
          }
          if (mismatches.length) {
            console.error(`dispatch version ${version} does not match package versions:`);
            for (const line of mismatches) console.error(`- ${line}`);
            process.exit(1);
          }
          NODE
      - name: Commit bumped versions
        if: github.event_name == 'workflow_dispatch'
        env:
          NPM_TAG: ${{ inputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml ":(glob)**/package.json"
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(release): bump ${NPM_TAG} to ${VERSION} [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
      - name: Publish to npm
        env:
          NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
        run: pnpm run "package:${NPM_TAG}" --no-git-checks --provenance
  release:
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  website:
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4

      # Mirror website.yml: the wasm playground links against samchon/ttsc
      # through packages/typia/native/go.work, and the website is a pnpm
      # workspace member consuming catalog: versions, so it must be installed
      # from the workspace root (a standalone npm install cannot resolve it).
      - name: Checkout ttsc sibling
        run: git clone --depth 1 https://github.com/samchon/ttsc.git ../ttsc
      - name: Build Packages
        run: |
          pnpm install
          pnpm run build
          pnpm run package:tgz
      - name: Website Build
        working-directory: website
        run: pnpm run build
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@4.1.3
        with:
          branch: gh-pages
          folder: ./website/out
