packages:
  - 'benchmark'
  - 'config'
  - 'examples'
  - 'packages/*'
  - 'tests/*'
  - 'website'
overrides:
  # nextra 4.6 (the website's docs theme) breaks on zod 4.4.x with
  # "Invalid input: expected nonoptional". Pin the 4.x line to 4.1.12 — the
  # version the website's former npm `overrides` pinned. Scoped to `zod@4` so
  # the monorepo's langchain / mcp / vercel integrations keep their zod 3.x.
  zod@4: 4.1.12
catalogs:
  typescript:
    '@ttsc/playground': ^0.16.0
    '@ttsc/unplugin': ^0.16.0
    '@ttsc/wasm': ^0.16.0
    ts-node: ^10.9.2
    ttsc: ^0.16.2
    typescript: 7.0.1-rc
  rollup:
    rollup: ^4.56.0
    rollup-plugin-node-externals: ^8.1.2
    '@rollup/plugin-commonjs': ^29.0.0
    '@rollup/plugin-esm-shim': ^0.1.8
    '@rollup/plugin-node-resolve': ^16.0.3
    '@rollup/plugin-terser': ^0.4.4
  utils:
    '@nestia/e2e': ^10.0.2
    '@types/node': ^25.3.0
    '@types/uuid': ^11.0.0
    openai: ^6.16.0
    rimraf: ^6.1.2
    uuid: ^13.0.0
    tstl: ^3.0.0
    tgrid: ^1.2.1
