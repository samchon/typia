name: test
on: 
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      - 'packages/**'
      - 'tests/**'
      - 'examples/**'
      - 'config/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    # `pnpm test` is the repository's longest command, and the lane that used to
    # run it a second time carried the only timeout in `.github/workflows`.
    # Without one a hung suite would burn GitHub's 360-minute default instead of
    # failing; 60 minutes is the bound that lane used.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4
      
      - name: Install Dependencies
        run: pnpm install

      # ttsc compiles the typia Go plugin on first use into
      # node_modules/.cache/ttsc, keyed by content (plugin source + ttsc/tsgo
      # versions). Restoring a stale cache is safe: a changed source misses the
      # binary key but still reuses the incremental go-build objects. Restored
      # after `pnpm install` so an install-time node_modules rebuild cannot
      # discard it.
      - name: Restore ttsc Plugin Cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/ttsc
          key: ttsc-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/typia/native/**') }}
          restore-keys: ttsc-cache-${{ runner.os }}-

      - name: Run Tests
        run: pnpm run test
