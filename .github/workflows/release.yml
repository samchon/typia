# author: elliot-huffman
name: release
on:
  push:
    tags:
      - "*"
permissions:
  id-token: write
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install
      - name: Publish to npm
        run: pnpm run package:latest --no-git-checks --provenance
  release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  website:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4

      # Mirror website.yml: the wasm playground links against samchon/ttsc
      # through packages/typia/native/go.work, and the website is a pnpm
      # workspace member consuming catalog: versions, so it must be installed
      # from the workspace root (a standalone npm install cannot resolve it).
      - name: Checkout ttsc sibling
        run: git clone --depth 1 https://github.com/samchon/ttsc.git ../ttsc
      - name: Build Packages
        run: |
          pnpm install
          pnpm run build
          pnpm run package:tgz
      - name: Website Build
        working-directory: website
        run: pnpm run build
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@4.1.3
        with:
          branch: gh-pages
          folder: ./website/out
