name: website
on: 
  push: 
    branches:
      - master
    paths:
      - .github/workflows/website.yml
      - 'examples/**'
      - 'packages/**'
      - 'website/**'
      - 'website/package.json'
      - 'package.json'
  pull_request:
    paths:
      - .github/workflows/website.yml
      - 'examples/**'
      - 'packages/**'
      - 'website/**'
      - 'website/package.json'
      - 'package.json'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 #v4
        with:
          node-version: 24.x
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4

      # The wasm playground build links against samchon/ttsc via a sibling
      # go.work file (packages/typia/native/go.work). Local layout puts ttsc
      # next to typia; CI must reproduce that so `go build` can resolve the
      # ttsc/* and ttsc/shim/* modules.
      - name: Checkout ttsc sibling
        run: git clone --depth 1 https://github.com/samchon/ttsc.git ../ttsc

      # website is a pnpm workspace member, so a single root `pnpm install`
      # wires its deps and the workspace symlinks to typia / @typia/*.
      # `pnpm run build` compiles every package to `lib/` (read by the website's
      # runtime pack, build/pack-typia-runtime.js), and `pnpm run package:tgz`
      # stages the tarballs that `website/compiler-dependencies` still installs
      # to feed embed-typescript's Monaco type pack.
      - name: Packages
        run: |
          pnpm install
          pnpm run build
          pnpm run package:tgz

      - name: Build
        working-directory: website
        run: pnpm run build

      - name: Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./website/out
