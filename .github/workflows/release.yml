# author: elliot-huffman
name: release
on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish"
        required: true
        type: choice
        options:
          - latest
          - rc
          - next
      version:
        description: "Exact version. latest: x.y.z, rc: x.y.z-rc.n, next: x.y.z-next.n"
        required: true
permissions:
  id-token: write
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4
        with:
          ref: ${{ github.ref_name }}
      - name: Validate dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          NPM_TAG: ${{ inputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          case "$NPM_TAG" in
            latest)
              PATTERN='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
              EXAMPLE='13.0.0'
              ;;
            rc)
              PATTERN='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-rc\.(0|[1-9][0-9]*)$'
              EXAMPLE='13.0.0-rc.2'
              ;;
            next)
              PATTERN='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-next\.(0|[1-9][0-9]*)$'
              EXAMPLE='13.0.0-next.0'
              ;;
            *)
              echo "::error::tag must be one of latest, rc, or next"
              exit 1
              ;;
          esac
          if [[ ! "$VERSION" =~ $PATTERN ]]; then
            echo "::error::tag '$NPM_TAG' requires version like $EXAMPLE"
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install
      - name: Bump versions
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: pnpm bumpp "$VERSION" --no-commit --no-tag --no-push --recursive --yes
      - name: Commit bumped versions
        if: github.event_name == 'workflow_dispatch'
        env:
          NPM_TAG: ${{ inputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml ":(glob)**/package.json"
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore(release): bump ${NPM_TAG} to ${VERSION}"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
      - name: Publish to npm
        env:
          NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
        run: pnpm run "package:${NPM_TAG}" --no-git-checks --provenance
  release:
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  website:
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
      - uses: pnpm/action-setup@v4

      # Mirror website.yml: the wasm playground links against samchon/ttsc
      # through packages/typia/native/go.work, and the website is a pnpm
      # workspace member consuming catalog: versions, so it must be installed
      # from the workspace root (a standalone npm install cannot resolve it).
      - name: Checkout ttsc sibling
        run: git clone --depth 1 https://github.com/samchon/ttsc.git ../ttsc
      - name: Build Packages
        run: |
          pnpm install
          pnpm run build
          pnpm run package:tgz
      - name: Website Build
        working-directory: website
        run: pnpm run build
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@4.1.3
        with:
          branch: gh-pages
          folder: ./website/out
