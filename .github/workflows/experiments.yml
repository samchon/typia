name: experiments
on:
  pull_request:
    paths:
      - '.github/workflows/experiments.yml'
      - 'packages/*/native/**'
      - 'packages/*/src/**'
      - 'packages/*/package.json'
      - 'toolchain/*/cmd/**'
      - 'toolchain/*/*.go'
      - 'toolchain/*/go.mod'
      - 'toolchain/*/go.sum'
      - 'toolchain/*/src/**'
      - 'toolchain/*/package.json'
      - 'experiments/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Build Tarballs
        run: pnpm run package:tgz

      - name: Test Experiments (unplugin)
        working-directory: experiments/unplugin
        run: npm install && npm start
